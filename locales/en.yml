en:
  theme_metadata:
    description: "Shows rich hover preview cards for internal topic links across topic lists, topic pages, search results, categories, tags, user profiles, and other supported Discourse areas."

  settings:
    enabled: "Enabled"
    enabled_description: "Enable the hover preview theme component."

    delay_show: "Hover Delay"
    delay_show_description: "Delay in milliseconds before the hover card appears."

    mobile_enabled: "Enable on Mobile"
    mobile_enabled_description: "Enable tap-to-preview behavior on touch devices. If disabled, mobile-specific preview behavior is turned off."

    density: "Density on Desktop"
    density_description: "Controls desktop hover card density."

    density_mobile: "Density on Mobile"
    density_mobile_description: "Controls mobile hover card density."

    card_width: "Card Width on Desktop"
    card_width_description: "Any valid CSS width value, such as 32rem, 420px, 50%, 40vw, or clamp(20rem, 40vw, 36rem)."

    mobile_width_percent: "Card Width on Mobile"
    mobile_width_percent_description: "Controls the mobile hover card width as a percentage of the viewport width."

    show_thumbnail: "Show Thumbnail on Desktop"
    show_thumbnail_description: "Display the topic thumbnail image on desktop."

    thumbnail_placement: "Thumbnail Placement on Desktop"
    thumbnail_placement_description: "Choose where the thumbnail appears on desktop."

    thumbnail_size_mode: "Thumbnail Sizing Mode on Desktop"
    thumbnail_size_mode_description: "On desktop, auto-fit-height matches the image height to the card height and uses the auto-fit max width setting to constrain width. Manual mode uses the configured percentage width."

    thumbnail_auto_fit_max_width: "Thumbnail Auto-Fit Max Width on Desktop"
    thumbnail_auto_fit_max_width_description: "Used only in auto-fit-height thumbnail sizing mode. Accepts valid CSS width values such as 8rem, 160px, or 12vw."

    thumbnail_size_percent: "Thumbnail Size as Percent on Desktop"
    thumbnail_size_percent_description: "Used only in manual thumbnail sizing mode. Sets the left or right image width as a percentage of the hover card width."

    show_thumbnail_mobile: "Show Thumbnail on Mobile"
    show_thumbnail_mobile_description: "Display the topic thumbnail image on mobile."

    thumbnail_placement_mobile: "Thumbnail Placement on Mobile"
    thumbnail_placement_mobile_description: "Choose where the thumbnail appears on mobile."

    thumbnail_size_mode_mobile: "Thumbnail Sizing Mode on Mobile"
    thumbnail_size_mode_mobile_description: "On mobile, auto-fit-height matches the image height to the card height and uses the mobile auto-fit max width setting to constrain width. Manual mode uses the configured percentage width."

    thumbnail_auto_fit_max_width_mobile: "Thumbnail Auto-Fit Max Width on Mobile"
    thumbnail_auto_fit_max_width_mobile_description: "Used only in mobile auto-fit-height thumbnail sizing mode. Accepts valid CSS width values such as 7rem, 140px, or 30vw."

    thumbnail_size_percent_mobile: "Thumbnail Size as Percent on Mobile"
    thumbnail_size_percent_mobile_description: "Used only in mobile manual thumbnail sizing mode. Sets the left or right image width as a percentage of the hover card width."

    thumbnail_height_top_bottom: "Top or Bottom Thumbnail Height on Desktop"
    thumbnail_height_top_bottom_description: "Used when the thumbnail is placed on top or bottom on desktop. Accepts valid CSS height values such as auto, 10rem, 180px, 20vh, or clamp(8rem, 20vw, 14rem)."

    thumbnail_height_top_bottom_mobile: "Top or Bottom Thumbnail Height on Mobile"
    thumbnail_height_top_bottom_mobile_description: "Used when the thumbnail is placed on top or bottom on mobile. Accepts valid CSS height values such as auto, 9rem, 160px, 25vh, or clamp(7rem, 24vw, 12rem)."

    show_title: "Show Title on Desktop"
    show_title_description: "Display the topic title on desktop."

    show_title_mobile: "Show Title on Mobile"
    show_title_mobile_description: "Display the topic title on mobile."

    show_excerpt: "Show Excerpt on Desktop"
    show_excerpt_description: "Display a text excerpt on desktop."

    excerpt_length: "Excerpt Lines on Desktop"
    excerpt_length_description: "Number of excerpt lines to show on desktop."

    show_excerpt_mobile: "Show Excerpt on Mobile"
    show_excerpt_mobile_description: "Display a text excerpt on mobile."

    excerpt_length_mobile: "Excerpt Lines on Mobile"
    excerpt_length_mobile_description: "Number of excerpt lines to show on mobile."

    show_category: "Show Category on Desktop"
    show_category_description: "Display the topic category badge on desktop when category data is available."

    show_category_mobile: "Show Category on Mobile"
    show_category_mobile_description: "Display the topic category badge on mobile when category data is available."

    show_tags: "Show Tags on Desktop"
    show_tags_description: "Display topic tags on desktop when tag data is available."

    show_tags_mobile: "Show Tags on Mobile"
    show_tags_mobile_description: "Display topic tags on mobile when tag data is available."

    show_op: "Show Original Poster on Desktop"
    show_op_description: "Display the original poster avatar and username in the metadata row on desktop."

    show_op_mobile: "Show Original Poster on Mobile"
    show_op_mobile_description: "Display the original poster avatar and username in the metadata row on mobile."

    show_publish_date: "Show Publish Date on Desktop"
    show_publish_date_description: "Display the topic creation date on desktop."

    show_publish_date_mobile: "Show Publish Date on Mobile"
    show_publish_date_mobile_description: "Display the topic creation date on mobile."

    show_views: "Show Number of Views on Desktop"
    show_views_description: "Display the topic view count on desktop."

    show_views_mobile: "Show Number of Views on Mobile"
    show_views_mobile_description: "Display the topic view count on mobile."

    show_reply_count: "Show Reply Count on Desktop"
    show_reply_count_description: "Display the topic reply count on desktop."

    show_reply_count_mobile: "Show Reply Count on Mobile"
    show_reply_count_mobile_description: "Display the topic reply count on mobile."

    show_likes: "Show Number of Likes on Desktop"
    show_likes_description: "Display the topic like count on desktop."

    show_likes_mobile: "Show Number of Likes on Mobile"
    show_likes_mobile_description: "Display the topic like count on mobile."

    show_activity: "Show Last Activity on Desktop"
    show_activity_description: "Display the most recent topic activity date on desktop."

    show_activity_mobile: "Show Last Activity on Mobile"
    show_activity_mobile_description: "Display the most recent topic activity date on mobile."

    enable_on_topic_list: "Enable on Topic Lists"
    enable_on_topic_list_description: "Show hover cards in standard topic list views."

    enable_on_latest: "Enable on Latest Lists"
    enable_on_latest_description: "Show hover cards in latest-topic list contexts."

    enable_on_categories: "Enable on Categories"
    enable_on_categories_description: "Show hover cards in category list and category homepage topic-list contexts."

    enable_on_tags: "Enable on Tags"
    enable_on_tags_description: "Show hover cards in tag-related views."

    enable_on_search: "Enable on Search"
    enable_on_search_description: "Show hover cards in search result views."

    enable_on_topic_page: "Enable on Topic Pages"
    enable_on_topic_page_description: "Show hover cards for internal topic links on topic pages, including posts and suggested topics."

    enable_on_user_profile: "Enable on User Profiles"
    enable_on_user_profile_description: "Show hover cards in user profile content areas."

    enable_on_other: "Enable on Other Cooked Content"
    enable_on_other_description: "Show hover cards in other cooked content areas not covered by the main view settings."

    enable_on_kanban_boards: "Enable on Kanban Boards"
    enable_on_kanban_boards_description: "Show hover cards for internal topic links in kanban board views, including pages like /latest?board=*."
    
    user_preference_field_name: "User Preference Field Name"
    user_preference_field_name_description: "Custom user field key used to disable hover cards per user. Supports direct keys, numeric IDs, and user_field_X keys."

    resolve_user_field_id_for_admins: "Resolve User Field ID for Admins"
    resolve_user_field_id_for_admins_description: "When enabled, staff can configure the preference field by name or user_field_X, and the component resolves the numeric user-field ID via /admin/config/user-fields.json."

    topic_cache_max: "Topic Cache Max"
    topic_cache_max_description: "Maximum number of topic JSON responses kept in the in-memory LRU cache during the current page session."

    debug_mode: "Debug Mode"
    debug_mode_description: "Log hover-card detection and user-field resolution details to the browser console for debugging."