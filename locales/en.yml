en:
  theme_metadata:
    description: "Shows rich preview cards for internal topic links and links to Wikipedia articles across topic lists, topic pages, search results, categories, tags, user profiles, and other supported Discourse areas."

  settings:
    enabled: "Enabled"
    enabled_description: "Enable the Rich Previews theme component."

    delay_show: "Hover Delay"
    delay_show_description: "Delay in milliseconds before the hover card appears."

    mobile_enabled: "Enable on Mobile"
    mobile_enabled_description: "Enable tap-to-preview behavior on touch devices."

    density: "Density on Desktop"
    density_description: "Controls hover card density on desktop."

    density_mobile: "Density on Mobile"
    density_mobile_description: "Controls hover card density on mobile."

    card_width: "Card Width on Desktop"
    card_width_description: "Desktop hover card width. Accepts valid CSS width values such as 32rem, 25ch, 420px, 50%, 40vw, or clamp(20rem, 40vw, 36rem)."

    mobile_width_percent: "Card Width on Mobile"
    mobile_width_percent_description: "Mobile hover card width as a percentage of the viewport width."

    show_thumbnail: "Show Thumbnail on Desktop"
    show_thumbnail_description: "Show the topic thumbnail image on desktop."

    thumbnail_placement: "Thumbnail Placement on Desktop"
    thumbnail_placement_description: "Thumbnail placement on desktop."

    thumbnail_size_mode: "Thumbnail Sizing Mode on Desktop"
    thumbnail_size_mode_description: "Auto-fit-height matches image height to card height. Manual mode uses the configured width percentage."

    thumbnail_auto_fit_max_width: "Thumbnail Auto-Fit Max Width on Desktop"
    thumbnail_auto_fit_max_width_description: "Used only in auto-fit-height mode. Accepts valid CSS width values such as 8rem, 160px, or 12vw."

    thumbnail_size_percent: "Thumbnail Size as Percent on Desktop"
    thumbnail_size_percent_description: "Used only in manual mode. Sets the thumbnail width as a percentage of the hover card width."

    show_thumbnail_mobile: "Show Thumbnail on Mobile"
    show_thumbnail_mobile_description: "Show the topic thumbnail image on mobile."

    thumbnail_placement_mobile: "Thumbnail Placement on Mobile"
    thumbnail_placement_mobile_description: "Thumbnail placement on mobile."

    thumbnail_size_mode_mobile: "Thumbnail Sizing Mode on Mobile"
    thumbnail_size_mode_mobile_description: "On mobile, auto-fit-height matches image height to card height. Manual mode uses the configured width percentage."

    thumbnail_auto_fit_max_width_mobile: "Thumbnail Auto-Fit Max Width on Mobile"
    thumbnail_auto_fit_max_width_mobile_description: "Used only in mobile auto-fit-height mode. Accepts valid CSS width values such as 7rem, 140px, or 30vw."

    thumbnail_size_percent_mobile: "Thumbnail Size as Percent on Mobile"
    thumbnail_size_percent_mobile_description: "Used only in mobile manual mode. Sets the thumbnail width as a percentage of the hover card width."

    thumbnail_height_top_bottom: "Top or Bottom Thumbnail Height on Desktop"
    thumbnail_height_top_bottom_description: "Used when the thumbnail is placed on top or bottom on desktop. Accepts valid CSS height values such as auto, 10rem, 180px, 20vh, or clamp(8rem, 20vw, 14rem)."

    thumbnail_height_top_bottom_mobile: "Top or Bottom Thumbnail Height on Mobile"
    thumbnail_height_top_bottom_mobile_description: "Used when the thumbnail is placed on top or bottom on mobile. Accepts valid CSS height values such as auto, 9rem, 160px, 25vh, or clamp(7rem, 24vw, 12rem)."

    show_title: "Show Title on Desktop"
    show_title_description: "Show the topic title on desktop."

    show_title_mobile: "Show Title on Mobile"
    show_title_mobile_description: "Show the topic title on mobile."

    show_excerpt: "Show Excerpt on Desktop"
    show_excerpt_description: "Show a text excerpt on desktop."

    excerpt_length: "Excerpt Lines on Desktop"
    excerpt_length_description: "Number of excerpt lines to show on desktop."

    show_excerpt_mobile: "Show Excerpt on Mobile"
    show_excerpt_mobile_description: "Show a text excerpt on mobile."

    excerpt_length_mobile: "Excerpt Lines on Mobile"
    excerpt_length_mobile_description: "Number of excerpt lines to show on mobile."

    show_category: "Show Category on Desktop"
    show_category_description: "Show the topic category badge on desktop when category data is available."

    show_category_mobile: "Show Category on Mobile"
    show_category_mobile_description: "Show the topic category badge on mobile when category data is available."

    show_tags: "Show Tags on Desktop"
    show_tags_description: "Show topic tags on desktop when tag data is available."

    show_tags_mobile: "Show Tags on Mobile"
    show_tags_mobile_description: "Show topic tags on mobile when tag data is available."

    show_op: "Show Original Poster on Desktop"
    show_op_description: "Show the original poster avatar and username on desktop."

    show_op_mobile: "Show Original Poster on Mobile"
    show_op_mobile_description: "Show the original poster avatar and username on mobile."

    show_publish_date: "Show Publish Date on Desktop"
    show_publish_date_description: "Show the topic creation date on desktop."

    show_publish_date_mobile: "Show Publish Date on Mobile"
    show_publish_date_mobile_description: "Show the topic creation date on mobile."

    show_views: "Show Number of Views on Desktop"
    show_views_description: "Show the topic view count on desktop."

    show_views_mobile: "Show Number of Views on Mobile"
    show_views_mobile_description: "Show the topic view count on mobile."

    show_reply_count: "Show Reply Count on Desktop"
    show_reply_count_description: "Show the topic reply count on desktop."

    show_reply_count_mobile: "Show Reply Count on Mobile"
    show_reply_count_mobile_description: "Show the topic reply count on mobile."

    show_likes: "Show Number of Likes on Desktop"
    show_likes_description: "Show the topic like count on desktop."

    show_likes_mobile: "Show Number of Likes on Mobile"
    show_likes_mobile_description: "Show the topic like count on mobile."

    show_activity: "Show Last Activity on Desktop"
    show_activity_description: "Show the last activity date on desktop."

    show_activity_mobile: "Show Last Activity on Mobile"
    show_activity_mobile_description: "Show the last activity date on mobile."

    enable_on_topic_list: "Enable on Topic Lists"
    enable_on_topic_list_description: "Enable hover cards in standard topic list views."

    enable_on_latest: "Enable on Latest Lists"
    enable_on_latest_description: "Enable hover cards in latest-topic list contexts."

    enable_on_categories: "Enable on Categories"
    enable_on_categories_description: "Enable hover cards in category list and category homepage topic-list contexts."

    enable_on_tags: "Enable on Tags"
    enable_on_tags_description: "Enable hover cards in tag-related views."

    enable_on_search: "Enable on Search"
    enable_on_search_description: "Enable hover cards in search result views."

    enable_on_topic_page: "Enable on Topic Pages"
    enable_on_topic_page_description: "Enable hover cards for internal topic links on topic pages, including posts and suggested topics."

    enable_on_user_profile: "Enable on User Profiles"
    enable_on_user_profile_description: "Enable hover cards in user profile content areas."

    enable_on_other: "Enable on Other Cooked Content"
    enable_on_other_description: "Enable hover cards in other cooked content areas not covered by the main view settings."

    enable_on_kanban_boards: "Enable on Kanban Boards"
    enable_on_kanban_boards_description: "Enable hover cards in kanban board views."

    included_tags: "Included HTML Tags"
    included_tags_description: "HTML tag names that explicitly allow hover cards when matched. If not empty, links must match one of these tags or included classes."

    included_classes: "Included CSS Classes"
    included_classes_description: "CSS classes that explicitly allow hover cards when matched. If not empty, links must match one of these classes or included tags."

    excluded_tags: "Excluded HTML Tags"
    excluded_tags_description: "HTML tag names whose links should be excluded from hover cards."

    excluded_classes: "Excluded CSS Classes"
    excluded_classes_description: "CSS classes whose links or ancestors should be excluded from hover cards."

    wikipedia_previews_enabled: "Enable Wikipedia Previews"
    wikipedia_previews_enabled_description: "Enable hover cards for Wikipedia article links."

    wikipedia_previews_base_url: "Wikipedia Base Host"
    wikipedia_previews_base_url_description: "Default Wikipedia host used when needed, such as en.wikipedia.org."

    wikipedia_previews_show_image: "Show Image in Wikipedia Previews"
    wikipedia_previews_show_image_description: "Show the article thumbnail image in Wikipedia previews when available."

    wikipedia_previews_use_extract_html: "Use HTML Extract for Wikipedia Previews"
    wikipedia_previews_use_extract_html_description: "Use the HTML extract returned by Wikipedia for preview text when available."
    
    wikipedia_density: "Wikipedia Density on Desktop"
    wikipedia_density_description: "Controls Wikipedia preview density on desktop."

    wikipedia_density_mobile: "Wikipedia Density on Mobile"
    wikipedia_density_mobile_description: "Controls Wikipedia preview density on mobile."

    user_preference_field_name: "User Preference Field Name"
    user_preference_field_name_description: "Custom user field key used to disable hover cards per user. Supports direct keys, numeric IDs, and user_field_X format."

    resolve_user_field_id_for_admins: "Resolve User Field ID for Admins"
    resolve_user_field_id_for_admins_description: "When enabled, staff can configure the preference field by name or user_field_X and the component will resolve the numeric user-field ID from the admin endpoint."

    topic_cache_max: "Topic Cache Max"
    topic_cache_max_description: "Maximum number of topic JSON responses kept in the in-memory LRU cache during the current page session."

    debug_mode: "Debug Mode"
    debug_mode_description: "Log hover-card detection and user-field resolution details to the browser console for debugging."