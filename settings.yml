card_delay_ms:
  default: 300
  type: integer
  min: 0
  max: 2000
  description: Delay in milliseconds before the hover card appears.

enable_on_mobile:
  default: false
  type: bool
  description: Enable tap-to-preview behavior on touch devices.

density:
  default: default
  type: enum
  choices:
    - default
    - cozy
    - compact
  description: Controls hover card density on desktop.

density_mobile:
  default: cozy
  type: enum
  choices:
    - default
    - cozy
    - compact
  description: Controls hover card density on mobile.

card_width:
  default: 32rem
  type: string
  description: Desktop hover card width. Accepts any valid CSS width value such as 32rem, 420px, 50%, 40vw, or clamp(20rem, 40vw, 36rem).

mobile_width_percent:
  default: 100
  type: integer
  min: 70
  max: 100
  description: Mobile hover card width as a percentage of the viewport width.

show_thumbnail:
  default: true
  type: bool
  description: Show the topic thumbnail image on desktop.

thumbnail_placement:
  default: left
  type: enum
  choices:
    - top
    - right
    - bottom
    - left
  description: Thumbnail placement on desktop (top, right, bottom, or left of card content).

thumbnail_size_mode:
  default: auto_fit_height
  type: enum
  choices:
    - manual
    - auto_fit_height
  description: Auto-fit-height matches image height to card height. Manual mode uses the configured width percentage.

thumbnail_auto_fit_max_width:
  default: 10rem
  type: string
  description: Used only in auto-fit-height mode. Accepts any valid CSS width value such as 8rem, 160px, or 12vw.

thumbnail_size_percent:
  default: 15
  type: integer
  min: 5
  max: 50
  description: Used only in manual mode. Sets the thumbnail width as a percentage of the hover card width.

show_thumbnail_mobile:
  default: true
  type: bool
  description: Show the topic thumbnail image on mobile.

show_title:
  default: true
  type: bool
  description: Show the topic title on desktop.

show_title_mobile:
  default: true
  type: bool
  description: Show the topic title on mobile.

show_excerpt:
  default: true
  type: bool
  description: Show a text excerpt on desktop.

excerpt_length:
  default: 3
  type: integer
  min: 1
  max: 12
  description: Number of excerpt lines to show on desktop.

show_excerpt_mobile:
  default: true
  type: bool
  description: Show a text excerpt on mobile.

excerpt_length_mobile:
  default: 3
  type: integer
  min: 1
  max: 12
  description: Number of excerpt lines to show on mobile.

show_category:
  default: true
  type: bool
  description: Show the topic category badge on desktop when category data is available.

show_category_mobile:
  default: true
  type: bool
  description: Show the topic category badge on mobile when category data is available.

show_tags:
  default: true
  type: bool
  description: Show topic tags on desktop when tag data is available.

show_tags_mobile:
  default: true
  type: bool
  description: Show topic tags on mobile when tag data is available.

show_op:
  default: true
  type: bool
  description: Show the original poster avatar and username on desktop.

show_op_mobile:
  default: true
  type: bool
  description: Show the original poster avatar and username on mobile.

show_publish_date:
  default: true
  type: bool
  description: Show the topic creation date on desktop.

show_publish_date_mobile:
  default: true
  type: bool
  description: Show the topic creation date on mobile.

show_views:
  default: true
  type: bool
  description: Show the topic view count on desktop.

show_views_mobile:
  default: true
  type: bool
  description: Show the topic view count on mobile.

show_reply_count:
  default: true
  type: bool
  description: Show the topic reply count on desktop.

show_reply_count_mobile:
  default: true
  type: bool
  description: Show the topic reply count on mobile.

show_likes:
  default: true
  type: bool
  description: Show the topic like count on desktop.

show_likes_mobile:
  default: true
  type: bool
  description: Show the topic like count on mobile.

show_activity:
  default: true
  type: bool
  description: Show the last activity date on desktop.

show_activity_mobile:
  default: true
  type: bool
  description: Show the last activity date on mobile.

enable_on_topics:
  default: true
  type: bool
  description: Show hover cards for internal topic links inside the original post.

enable_on_replies:
  default: true
  type: bool
  description: Show hover cards for internal topic links inside replies.

enable_on_topic_lists:
  default: true
  type: bool
  description: Show hover cards for internal topic links in standard topic list views.

enable_on_category_homepage_topic_lists:
  default: true
  type: bool
  description: Show hover cards for topic-list areas on category homepage layouts.

enable_on_doc_categories:
  default: true
  type: bool
  description: Show hover cards inside Discourse Doc Categories views.

enable_on_kanban_boards:
  default: true
  type: bool
  description: Show hover cards inside Discourse Kanban board views.

enable_on_suggested_topic_links:
  default: true
  type: bool
  description: Show hover cards for links in the suggested topics section.

user_preference_field_name:
  default: disable_topic_hover_cards
  type: string
  description: Custom user field key used to disable hover cards per user. Supports direct keys, numeric IDs, and user_field_X format.

resolve_user_field_id_for_admins:
  default: true
  type: bool
  description: When enabled, staff can configure the preference field by name or user_field_X and the component will resolve the numeric user-field ID from the admin endpoint.

topic_cache_max:
  default: 100
  type: integer
  min: 10
  max: 500
  description: Maximum number of topic JSON responses kept in the in-memory LRU cache during the current page session.

debug_mode:
  default: false
  type: bool
  description: Log hover-card detection and user-field resolution details to the browser console for debugging.
