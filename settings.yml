svg_icons:
  type: list
  list_type: compact
  default: "comment|up-right-from-square|wikipedia-w"
  description: Additional SVG icons used by configured preview providers.

preview_providers:
  type: objects
  default:
    - key: topic
      enabled: true
      label: Local topic
      glyph_mode: icon
      icon: comment
      emoji: "💬"
      require_https: true
      timeout_ms: 3000
    - key: remote_topic
      enabled: true
      label: Remote Discourse topic
      glyph_mode: icon
      icon: up-right-from-square
      emoji: "🌐"
      remote_hosts: "noobish.me"
      require_https: true
      timeout_ms: 3000
    - key: wikipedia
      enabled: true
      label: Wikipedia
      glyph_mode: icon
      icon: wikipedia-w
      emoji: "📚"
      require_https: true
      timeout_ms: 3000
  schema:
    name: provider
    properties:
      key:
        type: enum
        required: true
        choices:
          - topic
          - remote_topic
          - wikipedia
        description: Internal provider key.

      enabled:
        type: boolean
        default: true
        description: Whether this provider is enabled.

      label:
        type: string
        required: true
        description: Admin label for this provider.

      glyph_mode:
        type: enum
        default: icon
        choices:
          - none
          - icon
          - emoji
        description: Choose whether this provider uses an icon, emoji, or no glyph.

      icon:
        type: string
        description: Discourse icon name for this provider. Add the icon name to svg_icons if needed.

      emoji:
        type: string
        description: Emoji character for this provider.

      remote_hosts:
        type: string
        description: Pipe-separated allowed hostnames for this provider if applicable.

      require_https:
        type: boolean
        default: true
        description: Require HTTPS for this provider if it fetches remote content.

      timeout_ms:
        type: integer
        default: 3000
        description: Request timeout for this provider in milliseconds.